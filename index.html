<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RTL Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        h1 {
            color: #58a6ff;
            text-align: center;
            margin-bottom: 5px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .editors {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .editor-box {
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #30363d;
            overflow: hidden;
        }
        .editor-label {
            background: #21262d;
            padding: 10px 15px;
            color: #58a6ff;
            font-size: 13px;
            border-bottom: 1px solid #30363d;
        }
        textarea {
            width: 100%;
            height: 300px;
            background: #0d1117;
            color: #c9d1d9;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
            line-height: 1.5;
        }
        .run-btn {
            display: block;
            width: 200px;
            margin: 0 auto 20px;
            padding: 12px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        .run-btn:hover { background: #2ea043; }
        .run-btn:disabled { background: #444; cursor: not-allowed; }
        .output-box {
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #30363d;
            overflow: hidden;
        }
        .output-label {
            background: #21262d;
            padding: 10px 15px;
            font-size: 13px;
            border-bottom: 1px solid #30363d;
        }
        .output-label.success { color: #3fb950; }
        .output-label.error { color: #f85149; }
        .output-label.waiting { color: #8b949e; }
        #output {
            padding: 15px;
            min-height: 150px;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.6;
            color: #3fb950;
        }
        .tag {
            display: inline-block;
            background: #1f6feb;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin: 3px;
        }
        .tags {
            text-align: center;
            margin-bottom: 25px;
        }
        .examples {
            text-align: center;
            margin-bottom: 20px;
        }
        .example-btn {
            background: #21262d;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            margin: 4px;
            font-size: 12px;
        }
        .example-btn:hover { background: #30363d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ RTL Simulator</h1>
        <p class="subtitle">Built by Shaurya | Hosted on Google Cloud | Powered by iverilog</p>

        <div class="tags">
            <span class="tag">Google Cloud</span>
            <span class="tag">Docker</span>
            <span class="tag">Python Flask</span>
            <span class="tag">iverilog</span>
            <span class="tag">Verilog</span>
            <span class="tag">CI/CD</span>
        </div>

        <div class="examples">
            <button class="example-btn" onclick="loadExample('and')">AND Gate</button>
            <button class="example-btn" onclick="loadExample('counter')">4-bit Counter</button>
            <button class="example-btn" onclick="loadExample('mux')">4:1 MUX</button>
            <button class="example-btn" onclick="loadExample('fsm')">FSM</button>
        </div>

        <div class="editors">
            <div class="editor-box">
                <div class="editor-label">📄 RTL Design (Verilog)</div>
                <textarea id="rtl" placeholder="Enter your Verilog RTL code here..."></textarea>
            </div>
            <div class="editor-box">
                <div class="editor-label">🧪 Testbench</div>
                <textarea id="testbench" placeholder="Enter your testbench here..."></textarea>
            </div>
        </div>

        <button class="run-btn" onclick="runSimulation()">▶ Run Simulation</button>

        <div class="output-box">
            <div class="output-label waiting" id="output-label">⏳ Output will appear here</div>
            <div id="output">Select an example or paste your own code, then click Run Simulation...</div>
        </div>
    </div>

    <script>
        const examples = {
            and: {
                rtl: `module and_gate(
    input wire a,
    input wire b,
    output wire y
);
    assign y = a & b;
endmodule`,
                tb: `module tb_and_gate;
    reg a, b;
    wire y;
    and_gate uut(.a(a), .b(b), .y(y));
    initial begin
        $display("A B | Y");
        $display("------");
        a=0; b=0; #10;
        $display("%b %b | %b", a, b, y);
        a=0; b=1; #10;
        $display("%b %b | %b", a, b, y);
        a=1; b=0; #10;
        $display("%b %b | %b", a, b, y);
        a=1; b=1; #10;
        $display("%b %b | %b", a, b, y);
        $finish;
    end
endmodule`
            },
            counter: {
                rtl: `module up_down_counter(
    input wire clk,
    input wire rst,
    input wire up_down,
    output reg [3:0] count
);
    always @(posedge clk or posedge rst) begin
        if (rst)
            count <= 4'b0000;
        else if (up_down)
            count <= count + 1;
        else
            count <= count - 1;
    end
endmodule`,
                tb: `module tb_up_down_counter;
    reg clk, rst, up_down;
    wire [3:0] count;
    up_down_counter uut(.clk(clk),.rst(rst),.up_down(up_down),.count(count));
    always #5 clk = ~clk;
    initial begin
        clk=0; rst=1; up_down=1;
        #10 rst=0;
        $display("--- Counting UP ---");
        repeat(8) begin
            #10 $display("Count = %b (%0d)", count, count);
        end
        up_down=0;
        $display("--- Counting DOWN ---");
        repeat(8) begin
            #10 $display("Count = %b (%0d)", count, count);
        end
        rst=1; #10;
        $display("Reset = %b (%0d)", count, count);
        $finish;
    end
endmodule`
            },
            mux: {
                rtl: `module mux4to1(
    input wire [3:0] in,
    input wire [1:0] sel,
    output reg out
);
    always @(*) begin
        case(sel)
            2'b00: out = in[0];
            2'b01: out = in[1];
            2'b10: out = in[2];
            2'b11: out = in[3];
        endcase
    end
endmodule`,
                tb: `module tb_mux4to1;
    reg [3:0] in;
    reg [1:0] sel;
    wire out;
    mux4to1 uut(.in(in),.sel(sel),.out(out));
    initial begin
        in = 4'b1010;
        $display("Input = %b", in);
        $display("SEL | OUT");
        $display("---------");
        sel=2'b00; #10;
        $display(" %b  |  %b", sel, out);
        sel=2'b01; #10;
        $display(" %b  |  %b", sel, out);
        sel=2'b10; #10;
        $display(" %b  |  %b", sel, out);
        sel=2'b11; #10;
        $display(" %b  |  %b", sel, out);
        $finish;
    end
endmodule`
            },
            fsm: {
                rtl: `module fsm_101(
    input wire clk,
    input wire rst,
    input wire in,
    output reg out
);
    parameter S0=0, S1=1, S2=2, S3=3;
    reg [1:0] state;
    always @(posedge clk or posedge rst) begin
        if(rst) begin state<=S0; out<=0; end
        else case(state)
            S0: begin state<=(in?S1:S0); out<=0; end
            S1: begin state<=(in?S1:S2); out<=0; end
            S2: begin state<=(in?S3:S0); out<=0; end
            S3: begin state<=(in?S1:S2); out<=1; end
        endcase
    end
endmodule`,
                tb: `module tb_fsm_101;
    reg clk, rst, in;
    wire out;
    fsm_101 uut(.clk(clk),.rst(rst),.in(in),.out(out));
    always #5 clk=~clk;
    initial begin
        clk=0; rst=1; in=0;
        #10 rst=0;
        $display("Detecting pattern 101...");
        $display("IN | OUT");
        $display("--------");
        in=1; #10; $display(" %b |  %b", in, out);
        in=0; #10; $display(" %b |  %b", in, out);
        in=1; #10; $display(" %b |  %b", in, out);
        in=1; #10; $display(" %b |  %b", in, out);
        in=0; #10; $display(" %b |  %b", in, out);
        in=1; #10; $display(" %b |  %b", in, out);
        $finish;
    end
endmodule`
            }
        };

        function loadExample(name) {
            document.getElementById('rtl').value = examples[name].rtl;
            document.getElementById('testbench').value = examples[name].tb;
            document.getElementById('output').textContent = 'Example loaded! Click Run Simulation.';
            document.getElementById('output').style.color = '#3fb950';
        }

        // Load AND gate by default
        loadExample('and');

        async function runSimulation() {
            const rtl = document.getElementById('rtl').value;
            const testbench = document.getElementById('testbench').value;
            const btn = document.querySelector('.run-btn');
            const output = document.getElementById('output');
            const label = document.getElementById('output-label');

            btn.disabled = true;
            btn.textContent = 'Running...';
            output.textContent = 'Compiling and running simulation...';
            output.style.color = '#8b949e';
            label.className = 'output-label waiting';
            label.textContent = 'Running simulation...';

            try {
                const response = await fetch('http://' + window.location.hostname + ':5000/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rtl, testbench })
                });

                const result = await response.json();

                if (result.success) {
                    output.textContent = result.output || 'Simulation completed with no output.';
                    output.style.color = '#3fb950';
                    label.className = 'output-label success';
                    label.textContent = 'Simulation successful';
                } else {
                    output.textContent = result.output;
                    output.style.color = '#f85149';
                    label.className = 'output-label error';
                    label.textContent = 'Compilation error';
                }
            } catch(e) {
                output.textContent = 'Error connecting to simulation server. Make sure Flask API is running.';
                output.style.color = '#f85149';
                label.className = 'output-label error';
                label.textContent = 'Connection error';
            }

            btn.disabled = false;
            btn.textContent = '▶ Run Simulation';
        }
    </script>
</body>
</html>
