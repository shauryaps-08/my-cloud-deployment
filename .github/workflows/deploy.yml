name: Deploy RTL Simulator to Google Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          source: "app.py,index.html"
          target: "/home/${{ secrets.GCP_USERNAME }}/rtl-simulator/"
          overwrite: true

      - name: Restart services on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            sudo cp ~/rtl-simulator/index.html /var/www/html/index.html
            sudo systemctl restart flask-rtl
            echo "Deployment complete!"
